<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forbidden West Wiki</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;600&family=Kensmark+One&display=swap" rel="stylesheet">

  <!-- Theme stylesheet -->
  <link rel="stylesheet" href="css/Variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/articles.css">

  <!-- Favicon -->
  <link rel="icon" href="images/icon.ico" type="image/x-icon" />
</head>
<body class="homepage">
  <!-- HEADER -->
  <header class="topbar" role="banner">
    <div class="topbar-inner">
      <div class="logo">
        <div class="logo-mark" aria-hidden="true"></div>
        <div class="logo-text">Forbidden West Wiki</div>
      </div>

      <div class="search-wrap">
        <input id="searchBar" class="search-input" type="search" autocomplete="off" placeholder="Search machines, tribes or locations..." aria-label="Search">
        <div id="search-results" class="search-results" role="listbox" aria-label="Search results"></div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main id="mainContent">
    <!-- HOME LANDING -->
    <section id="home-section" class="home-landing" aria-label="Home">
      <div class="parallax-bg" aria-hidden="true"></div>
      <div class="hero-overlay">
        <h1 class="hero-title">Welcome to the Forbidden West Wiki</h1>
        <p class="hero-lead">
          A compact, well-organized compendium of machines, lore, and guides for <em>Horizon Forbidden West</em>.
          Use the search box above to find machines, elements, and other entries. This page is a friendly landing — start where you like.
        </p>

        <div class="cta-row">
          <button id="cta-explore" class="btn-ghost">Explore Machines</button>
          <a class="btn-primary" href="#" id="cta-learn">What is this wiki?</a>
        </div>
      </div>
    </section>

    <!-- ARTICLE CONTAINER -->
    <div id="article-container" aria-live="polite"></div>
  </main>

  <!-- Scripts -->
  <script src="script.js" defer></script>
</body>
</html>
